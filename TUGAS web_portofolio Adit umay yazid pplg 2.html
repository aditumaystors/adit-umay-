<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Portfolio</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial;
    }

    body{
      background:#f1f5f9;
      padding:30px;
    }

    .container{
      max-width:850px;
      margin:auto;
      background:white;
      border-radius:15px;
      padding:25px;
      box-shadow:0 5px 15px rgba(0,0,0,0.1);
    }

    .top{
      display:flex;
      align-items:center;
      gap:20px;
      border-bottom:2px solid #e2e8f0;
      padding-bottom:20px;
    }

    .top img{
      width:100px;
      height:100px;
      border-radius:50%;
      object-fit:cover;
    }

    .name h1{
      color:#0f172a;
      margin-bottom:5px;
    }

    .name p{
      color:gray;
    }

    .box{
      margin-top:25px;
    }

    .box h2{
      margin-bottom:15px;
      color:#256aeb;
    }

    .box p{
      margin-bottom:10px;
      color:#334155;
    }

    .skill{
      margin-bottom:15px;
    }

    .bar{
      width:100%;
      height:8px;
      background:#dbeafe;
      border-radius:10px;
      margin-top:5px;
      overflow:hidden;
    }

    .fill{
      height:100%;
      background:#25eb4d;
    }

    button{
      margin-top:15px;
      padding:10px 18px;
      border:none;
      background:#255aeb;
      color:white;
      border-radius:7px;
      cursor:pointer;
    }

    button:hover{
      background:#1d4ed8;
    }

  </style>
</head>
<body>

  <div class="container">

    <div class="top">

      <img src="Screenshot 2026-05-08 093045.png">

      <div class="name">
        <h1>Adit Umay Yazid</h1>
        <p>Web Developer</p>

        <button>Contact Me</button>
      </div>

    </div>

    <div class="box">

      <h2>Tentang Saya</h2>

      <p>
        Saya adalah seorang pelajar yang sedang belajar
        membuat website menggunakan HTML dan CSS.
      </p>

    </div>

    <div class="box">

      <h2>Data Diri</h2>

      <p>Nama : Adit umay Yazid</p>
      <p>Email : yazid@gmail.com</p>
      <p>Alamat : JL.koong kampung perigi</p>

    </div>

    <div class="box">

      <h2>Skill</h2>

      <div class="skill">
        HTML
        <div class="bar">
          <div class="fill" style="width:90%"></div>
        </div>
      </div>

      <div class="skill">
        CSS
        <div class="bar">
          <div class="fill" style="width:80%"></div>
        </div>
      </div>

      <div class="skill">
        JavaScript
        <div class="bar">
          <div class="fill" style="width:60%"></div>
        </div>
      </div>

    </div>

  </div>

</body>
</html>
